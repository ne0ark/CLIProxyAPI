commands:
  install: go mod download
  format: gofmt -w ./cmd ./internal ./sdk ./test
  test: go test -count=1 -p 16 ./...
  build: go build -o test-output.exe ./cmd/server; if (Test-Path test-output.exe) { Remove-Item test-output.exe }
  compilecheck: go build -o test-output.exe ./cmd/server; if (Test-Path test-output.exe) { Remove-Item test-output.exe }
  race_pr2914: go test -race -count=1 ./internal/api ./internal/api/handlers/management ./internal/config

services: {}
