name: agents-md-freshness

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate documented single-test command
        run: go test -v -run TestAgentsMDFreshness ./test

      - name: Validate documented dev server command
        run: go run ./cmd/server -h

      - name: Validate documented full test command
        run: go test ./...

      - name: Validate documented build commands
        run: |
          go build -o cli-proxy-api ./cmd/server
          rm -f cli-proxy-api
          go build -o test-output ./cmd/server
          rm -f test-output
