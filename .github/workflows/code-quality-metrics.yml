name: code-quality-metrics

on:
  pull_request:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  code-quality-metrics:
    runs-on: ubuntu-latest
    env:
      FLAKY_TEST_REPEAT_COUNT: "5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate metrics helpers
        run: python3 -m py_compile .github/scripts/code_quality_metrics.py .github/scripts/flaky_test_detection.py

      - name: Measure canonical build performance
        run: |
          python3 - <<'PY'
          import json
          import shlex
          import subprocess
          import time
          from datetime import datetime, timezone
          from pathlib import Path

          output_path = Path("test-output")
          command = ["go", "build", "-o", str(output_path), "./cmd/server"]

          started_at = datetime.now(timezone.utc)
          start = time.perf_counter()
          subprocess.run(command, check=True)
          duration_seconds = round(time.perf_counter() - start, 3)
          finished_at = datetime.now(timezone.utc)

          payload = {
              "command": command,
              "command_display": shlex.join(command),
              "started_at_utc": started_at.replace(microsecond=0).isoformat(),
              "finished_at_utc": finished_at.replace(microsecond=0).isoformat(),
              "duration_seconds": duration_seconds,
              "exit_code": 0,
              "output_path": output_path.as_posix(),
              "output_size_bytes": output_path.stat().st_size,
          }
          Path("build-performance.json").write_text(f"{json.dumps(payload, indent=2)}\n", encoding="utf-8")

          output_path.unlink()
          PY

      - name: Generate technical debt report
        id: techdebt
        shell: bash
        run: |
          set +e
          go run ./cmd/checktechdebt --format json --output technical-debt-report.json
          status=$?
          set -e
          if [ ! -f technical-debt-report.json ]; then
            exit "$status"
          fi
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Generate coverage profile and test performance report
        run: |
          python3 - <<'PY'
          import json
          import shlex
          import subprocess
          import time
          from datetime import datetime, timezone
          from pathlib import Path

          coverage_profile = Path("coverage.out")
          command = [
              "go",
              "test",
              "-covermode=atomic",
              "-coverpkg=./...",
              "-coverprofile=coverage.out",
              "./...",
          ]

          started_at = datetime.now(timezone.utc)
          start = time.perf_counter()
          completed = subprocess.run(command, check=False)
          duration_seconds = round(time.perf_counter() - start, 3)
          finished_at = datetime.now(timezone.utc)

          payload = {
              "command": command,
              "command_display": shlex.join(command),
              "started_at_utc": started_at.replace(microsecond=0).isoformat(),
              "finished_at_utc": finished_at.replace(microsecond=0).isoformat(),
              "duration_seconds": duration_seconds,
              "exit_code": completed.returncode,
              "coverage_profile_path": coverage_profile.as_posix(),
              "coverage_profile_exists": coverage_profile.exists(),
              "coverage_profile_size_bytes": coverage_profile.stat().st_size if coverage_profile.exists() else 0,
          }
          Path("test-performance.json").write_text(f"{json.dumps(payload, indent=2)}\n", encoding="utf-8")

          if completed.returncode != 0:
              raise SystemExit(completed.returncode)
          PY

      - name: Run repeated flaky test probes
        run: |
          python3 .github/scripts/flaky_test_detection.py \
            --package ./internal/watcher \
            --package ./sdk/cliproxy/auth \
            --package ./sdk/api/handlers/openai \
            --package ./test \
            --repeat-count "${FLAKY_TEST_REPEAT_COUNT}" \
            --events-out flaky-test-events.jsonl \
            --json-out flaky-test-detection.json \
            --md-out flaky-test-detection.md
          cat flaky-test-detection.md >> "$GITHUB_STEP_SUMMARY"

      - name: Generate cyclomatic complexity report
        run: go run github.com/fzipp/gocyclo/cmd/gocyclo@v0.6.0 -over 0 . > gocyclo-report.txt

      - name: Build code quality metrics report
        run: |
          python3 .github/scripts/code_quality_metrics.py \
            --coverage coverage.out \
            --complexity gocyclo-report.txt \
            --tech-debt technical-debt-report.json \
            --build-performance build-performance.json \
            --test-performance test-performance.json \
            --flaky-test-report flaky-test-detection.json \
            --json-out code-quality-metrics.json \
            --md-out code-quality-metrics.md
          cat code-quality-metrics.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload code quality metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-metrics
          path: |
            coverage.out
            gocyclo-report.txt
            technical-debt-report.json
            build-performance.json
            test-performance.json
            flaky-test-events.jsonl
            flaky-test-detection.json
            flaky-test-detection.md
            code-quality-metrics.json
            code-quality-metrics.md
          if-no-files-found: error
